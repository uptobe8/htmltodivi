name: Convertir HTML a Divi JSON

on:
  workflow_dispatch:
    inputs:
      source_type:
        description: "Tipo de entrada"
        required: true
        default: "file"
        type: choice
        options:
          - file
          - url
      source_value:
        description: "URL o archivo del repo. Ej: input/page.html"
        required: true
        default: "input/page.html"
      divi_version:
        description: "Versión Divi destino"
        required: true
        default: "divi5"
        type: choice
        options:
          - divi5
          - divi4

permissions:
  contents: read

env:
  PAGE2DIVI_RELEASE_REPO: remarkablepc/Page2Divi

jobs:
  convert:
    name: Convertir con Page2Divi
    runs-on: windows-latest

    steps:
      - name: Descargar este repositorio
        uses: actions/checkout@v4

      - name: Descargar Page2Divi Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{ "User-Agent" = "uptobe-htmltodivi-action" }
          $releaseUrl = "https://api.github.com/repos/$env:PAGE2DIVI_RELEASE_REPO/releases/latest"
          $release = Invoke-RestMethod -Headers $headers -Uri $releaseUrl

          $assets = $release.assets | Where-Object { $_.name -match '\.zip$' }
          $asset = $assets | Where-Object { $_.name -match '(?i)(win|windows)' } | Select-Object -First 1

          if (-not $asset) {
            Write-Host "Assets encontrados:"
            $release.assets | ForEach-Object { Write-Host "- $($_.name)" }
            throw "No se encontró ZIP de Windows en la última release."
          }

          Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile "page2divi.zip"
          Expand-Archive -Path "page2divi.zip" -DestinationPath "page2divi" -Force

          $exe = Get-ChildItem -Path "page2divi" -Recurse -Filter "Page2Divi.exe" | Select-Object -First 1
          if (-not $exe) { throw "No se encontró Page2Divi.exe dentro del ZIP." }

          "PAGE2DIVI_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $exe.FullName --version

      - name: Convertir a JSON Divi
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sourceType = "${{ github.event.inputs.source_type }}"
          $sourceValue = "${{ github.event.inputs.source_value }}"
          $diviVersion = "${{ github.event.inputs.divi_version }}"

          if ($sourceType -eq "url") {
            & "$env:PAGE2DIVI_EXE" --url "$sourceValue" --divi-version "$diviVersion"
          } else {
            $filePath = Join-Path $env:GITHUB_WORKSPACE $sourceValue
            if (-not (Test-Path $filePath)) { throw "No existe el archivo: $filePath" }
            & "$env:PAGE2DIVI_EXE" --file "$filePath" --divi-version "$diviVersion"
          }

          Write-Host "Archivos generados:"
          Get-ChildItem -Path "output" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Subir resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: page2divi-output
          path: output/
          if-no-files-found: error
          retention-days: 7
